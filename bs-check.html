<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار تقييم مخاطر الإصابة بالسكري</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --primary-color: #0056b3;
            --primary-hover: #004494;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --danger-bg: #f8d7da;
            --danger-text: #721c24;
            --success-bg: #d4edda;
            --success-text: #155724;
            --active-bg: #e6f2ff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 26px;
            margin-bottom: 10px;
        }

        p.description {
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 35px;
        }

        .question-group {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .question-group:last-of-type {
            border-bottom: none;
        }

        label.question-title {
            font-weight: 700;
            display: block;
            margin-bottom: 15px;
            font-size: 16px;
            color: #222;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            background: #fdfdfd;
            padding: 12px 18px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            transition: all 0.2s ease-in-out;
            flex: 1;
            min-width: 140px;
        }

        .radio-option:hover {
            border-color: #b3d4f5;
            background: #f8fbff;
        }

        /* تمييز الخيار المحدد بصرياً */
        .radio-option:has(input[type="radio"]:checked) {
            border-color: var(--primary-color);
            background: var(--active-bg);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0, 86, 179, 0.1);
        }

        .radio-option input[type="radio"] {
            margin-left: 10px;
            cursor: pointer;
            accent-color: var(--primary-color);
            width: 18px;
            height: 18px;
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        .input-group div {
            flex: 1;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
            background-color: #fdfdfd;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            font-family: 'Tajawal', sans-serif;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2);
        }

        button.submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        button.reset-btn {
            background-color: #e9ecef;
            color: #495057;
            display: none; /* مخفي افتراضياً ويظهر مع النتيجة */
        }

        button.reset-btn:hover {
            background-color: #dee2e6;
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-score {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .high-risk {
            background-color: var(--danger-bg);
            color: var(--danger-text);
            border: 2px solid #f5c6cb;
        }

        .low-risk {
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 2px solid #c3e6cb;
        }

        .hidden {
            display: none !important;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .disclaimer {
            font-size: 13px;
            color: #777;
            text-align: center;
            margin-top: 25px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }

        .footer-copyright {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            font-family: 'Arial', sans-serif;
        }

        @media (max-width: 500px) {
            .input-group { flex-direction: column; }
            .radio-option { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>اختبار تقييم مخاطر السكري</h1>
    <p class="description">أجب عن الأسئلة السبعة التالية لمعرفة مدى احتمالية إصابتك بمرض السكري من النوع الثاني:</p>

    <form id="diabetesForm">
        
        <div class="question-group">
            <label class="question-title">1. كم عمرك؟</label>
            <div class="options-container">
                <label class="radio-option"><input type="radio" name="age" value="0" required> أقل من 40 سنة</label>
                <label class="radio-option"><input type="radio" name="age" value="1"> 40 - 49 سنة</label>
                <label class="radio-option"><input type="radio" name="age" value="2"> 50 - 59 سنة</label>
                <label class="radio-option"><input type="radio" name="age" value="3"> 60 سنة فما فوق</label>
            </div>
        </div>

        <div class="question-group">
            <label class="question-title">2. ما هو جنسك؟</label>
            <div class="options-container">
                <label class="radio-option"><input type="radio" name="gender" value="man" required> ذكر</label>
                <label class="radio-option"><input type="radio" name="gender" value="woman"> أنثى</label>
            </div>
        </div>

        <div class="question-group hidden" id="gestationalDiv">
            <label class="question-title">هل سبق أن تم تشخيصك بـ "سكري الحمل"؟</label>
            <div class="options-container">
                <label class="radio-option"><input type="radio" name="gestational" value="1"> نعم</label>
                <label class="radio-option"><input type="radio" name="gestational" value="0"> لا</label>
            </div>
        </div>

        <div class="question-group">
            <label class="question-title">3. هل يوجد تاريخ عائلي للإصابة بالسكري (الأب، الأم، الأخ، أو الأخت)؟</label>
            <div class="options-container">
                <label class="radio-option"><input type="radio" name="family" value="1" required> نعم</label>
                <label class="radio-option"><input type="radio" name="family" value="0"> لا</label>
            </div>
        </div>

        <div class="question-group">
            <label class="question-title">4. هل سبق تشخيصك بارتفاع ضغط الدم؟</label>
            <div class="options-container">
                <label class="radio-option"><input type="radio" name="bp" value="1" required> نعم</label>
                <label class="radio-option"><input type="radio" name="bp" value="0"> لا</label>
            </div>
        </div>

        <div class="question-group">
            <label class="question-title">5. هل تمارس نشاطاً بدنياً بانتظام؟</label>
            <div class="options-container">
                <label class="radio-option"><input type="radio" name="activity" value="0" required> نعم</label>
                <label class="radio-option"><input type="radio" name="activity" value="1"> لا</label>
            </div>
        </div>

        <div class="question-group">
            <label class="question-title">6 و 7. أدخل طولك ووزنك لتقييم بنية الجسم (BMI):</label>
            <div class="input-group">
                <div>
                    <label for="height">الطول (سم)</label>
                    <input type="number" id="height" name="height" placeholder="مثال: 170" required min="100" max="250" step="any">
                </div>
                <div>
                    <label for="weight">الوزن (كجم)</label>
                    <input type="number" id="weight" name="weight" placeholder="مثال: 75" required min="30" max="300" step="any">
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="submit-btn" id="submitBtn">احسب النتيجة</button>
            <button type="button" class="reset-btn" id="resetBtn" onclick="resetTest()">إعادة الاختبار</button>
        </div>
    </form>

    <div id="resultBox" class="result-box">
        <div id="scoreText" class="result-score"></div>
        <div id="messageText"></div>
    </div>

    <p class="disclaimer">ملاحظة: هذا الاختبار هو أداة تقييم مبدئية فقط وليس تشخيصاً طبياً قاطعاً.</p>

    <div class="footer-copyright">
        Jamal-Alshami &copy; 2026
    </div>

</div>

<script>
    const form = document.getElementById('diabetesForm');
    const genderRadios = document.querySelectorAll('input[name="gender"]');
    const gestationalDiv = document.getElementById('gestationalDiv');
    const gestationalRadios = document.querySelectorAll('input[name="gestational"]');
    const resultBox = document.getElementById('resultBox');
    const resetBtn = document.getElementById('resetBtn');
    const submitBtn = document.getElementById('submitBtn');

    // التحكم في إظهار وإخفاء سؤال سكري الحمل
    genderRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === 'woman') {
                gestationalDiv.classList.remove('hidden');
                gestationalRadios[0].required = true;
            } else {
                gestationalDiv.classList.add('hidden');
                gestationalRadios.forEach(r => { r.checked = false; r.required = false; });
            }
        });
    });

    // معالجة إرسال النموذج باستخدام FormData (طريقة احترافية ونظيفة)
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(form);
        let score = 0;

        // حساب النقاط من الخيارات
        score += parseInt(formData.get('age'));
        score += parseInt(formData.get('family'));
        score += parseInt(formData.get('bp'));
        score += parseInt(formData.get('activity'));

        // حساب نقاط الجنس وسكري الحمل
        const gender = formData.get('gender');
        if (gender === 'man') {
            score += 1;
        } else if (gender === 'woman' && formData.get('gestational')) {
            score += parseInt(formData.get('gestational'));
        }

        // حساب مؤشر كتلة الجسم (BMI)
        const weight = parseFloat(formData.get('weight'));
        const heightCm = parseFloat(formData.get('height'));
        const heightM = heightCm / 100;
        const bmi = weight / (heightM * heightM);

        if (bmi >= 40) {
            score += 3;
        } else if (bmi >= 30) {
            score += 2;
        } else if (bmi >= 25) {
            score += 1;
        }

        // عرض النتيجة
        const scoreText = document.getElementById('scoreText');
        const messageText = document.getElementById('messageText');

        resultBox.style.display = 'block';
        scoreText.innerText = `النتيجة: ${score} من 10`;

        if (score >= 5) {
            resultBox.className = 'result-box high-risk';
            messageText.innerHTML = "<strong>لديك خطر مرتفع للإصابة بمرض السكري من النوع الثاني.</strong><br>يُنصح بشدة بتحديد موعد مع طبيبك لإجراء فحص دم بسيط للتأكد من مستويات السكر لديك.";
        } else {
            resultBox.className = 'result-box low-risk';
            messageText.innerHTML = "<strong>لديك خطر منخفض للإصابة.</strong><br>استمر في الحفاظ على نمط حياة صحي، من خلال التغذية السليمة والنشاط البدني المنتظم.";
        }
        
        // إظهار زر إعادة الاختبار وتمرير الشاشة للنتيجة
        resetBtn.style.display = 'block';
        submitBtn.innerText = 'تحديث النتيجة';
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // دالة إعادة الاختبار
    function resetTest() {
        form.reset();
        resultBox.style.display = 'none';
        resetBtn.style.display = 'none';
        submitBtn.innerText = 'احسب النتيجة';
        gestationalDiv.classList.add('hidden');
        gestationalRadios.forEach(r => r.required = false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
